name: Deploy Frontend to Bluehost

# Runs automatically on every push to main
on:
  push:
    branches:
      - main
    paths:
      # Only trigger when frontend source files change
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/index.html'
      - 'frontend/vite.config.*'
      - 'frontend/package.json'
      - 'frontend/tailwind.config.*'
      - '.github/workflows/deploy-bluehost.yml'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Bluehost
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repository ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Install pnpm ─────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # ── 5. Build the frontend ───────────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        env:
          # Points to the Railway backend API
          VITE_API_URL: https://rs-lld-website-production.up.railway.app
        run: pnpm build

      # ── 6. Deploy dist/ to Bluehost via FTP ─────────────────────────────────
      - name: Deploy to Bluehost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # FTP server hostname — set this in GitHub Secrets
          server: ${{ secrets.BLUEHOST_FTP_HOST }}
          # FTP username — set this in GitHub Secrets
          username: ${{ secrets.BLUEHOST_FTP_USER }}
          # FTP password — set this in GitHub Secrets
          password: ${{ secrets.BLUEHOST_FTP_PASS }}
          # Local folder to upload (contents of dist/)
          local-dir: ./frontend/dist/
          # Remote folder on Bluehost (the public_html root)
          server-dir: ${{ secrets.BLUEHOST_FTP_PATH }}
          # Only upload files that have changed (faster deploys)
          dangerous-clean-slate: false
          # Exclude hidden files and source maps
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map
